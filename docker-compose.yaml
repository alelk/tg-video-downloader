# docker-compose for LOCAL DEVELOPMENT.
#
# Usage:
#   docker compose up --build -d
#   docker compose logs -f server
#   docker compose down
#
# Secrets (required):
#   TELEGRAM_BOT_TOKEN — Telegram bot token
#   GITHUB_USER / GITHUB_TOKEN — для аутентификации в GitHub Packages при сборке
#
# Опциональные переменные для кук yt-dlp:
#   YTDLP_COOKIES_FILE — путь к файлу cookies (Netscape-формат)

services:

  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: tgvd-db
    environment:
      POSTGRES_USER: tgvd
      POSTGRES_PASSWORD: tgvd
      POSTGRES_DB: tgvd
    ports:
      - "5433:5432"   # 5433 на хосте — не конфликтует с локальным Postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgvd -d tgvd"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tgvd-network
    restart: unless-stopped

  # ── Ktor Backend Server ──
  server:
    build:
      context: .
      dockerfile: server/app/Dockerfile
      args:
        GITHUB_USER: ${GITHUB_USER:-}
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    container_name: tgvd-server
    ports:
      - "8080:8080"
    environment:
      # Внешний конфиг-файл (смонтирован через configs)
      APP_CONFIG: /app/config/application.yaml
      # Секреты (из .env файла) — подставляются в application.yaml через Hoplite ${...}
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-dev-token}"
      TELEGRAM_ALLOWED_USER_IDS: "${TELEGRAM_ALLOWED_USER_IDS:-}"
      TELEGRAM_ALLOWED_USERNAMES: "${TELEGRAM_ALLOWED_USERNAMES:-}"
      TELEGRAM_DEV_MODE: "${TELEGRAM_DEV_MODE:-true}"
      YTDLP_COOKIES_FILE: "${YTDLP_COOKIES_FILE:-}"
      # Mini App auto-reply bot
      TELEGRAM_BOT_MINI_APP_ENABLED: "${TELEGRAM_BOT_MINI_APP_ENABLED:-false}"
      TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME:-}"
      TELEGRAM_BOT_MINI_APP_SHORT_NAME: "${TELEGRAM_BOT_MINI_APP_SHORT_NAME:-}"
      TELEGRAM_BOT_MINI_APP_BUTTON_TEXT: "${TELEGRAM_BOT_MINI_APP_BUTTON_TEXT:-Open Mini App}"
      TELEGRAM_BOT_MINI_APP_REPLY_TEXT: "${TELEGRAM_BOT_MINI_APP_REPLY_TEXT:-Got your link. Open Mini App to continue.}"
    configs:
      - source: server-config
        target: /app/config/application.yaml
    volumes:
      - ${TGVD_MEDIA_DIR:-./data/media}:/data/media
      - ${TGVD_TEMP_DIR:-./data/temp}:/data/temp
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tgvd-network
    restart: unless-stopped

  # ── Telegram Mini App (nginx) ──
  webapp:
    build:
      context: .
      dockerfile: tgminiapp/Dockerfile
      args:
        GITHUB_USER: ${GITHUB_USER:-}
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    container_name: tgvd-webapp
    ports:
      - "3000:80"
    environment:
      # URL бэкенда — виден из браузера, не из контейнера!
      API_BASE_URL: "${API_BASE_URL:-http://localhost:8080}"
    depends_on:
      - server
    networks:
      - tgvd-network
    restart: unless-stopped

volumes:
  db-data:
    name: tgvd-db-data

configs:
  server-config:
    content: |
      server:
        port: 8080
        host: "0.0.0.0"
        baseUrl: "http://localhost:8080"

      telegram:
        botToken: "$${TELEGRAM_BOT_TOKEN:-dev-token}"
        allowedUserIds: []
        allowedUsernames: []
        devMode: $${TELEGRAM_DEV_MODE:-true}
        miniAppAutoReply:
          enabled: $${TELEGRAM_BOT_MINI_APP_ENABLED:-false}
          botUsername: "$${TELEGRAM_BOT_USERNAME:-}"
          appShortName: "$${TELEGRAM_BOT_MINI_APP_SHORT_NAME:-}"
          buttonText: "$${TELEGRAM_BOT_MINI_APP_BUTTON_TEXT:-Open Mini App}"
          replyText: "$${TELEGRAM_BOT_MINI_APP_REPLY_TEXT:-Got your link. Open Mini App to continue.}"
          urlPatterns: []
          pollingTimeoutSeconds: 60

      db:
        url: "jdbc:postgresql://db:5432/tgvd"
        user: "tgvd"
        password: "tgvd"
        poolSize: 10
        minIdle: 2

      storage:
        baseDirectories:
          - "/data/media"
        tempDirectory: "/data/temp"

      ytDlp:
        path: "/app/bin/yt-dlp"
        timeout: "30m"
        retries: 3
        fragmentRetries: 10
        allowUpdate: true
        updateChannel: "stable"
        autoDownload: true
        cookiesFile: "$${YTDLP_COOKIES_FILE:-}"

      ffmpeg:
        path: "ffmpeg"
        timeout: "60m"

      jobs:
        maxConcurrentDownloads: 2
        maxAttempts: 3
        pollIntervalMs: 5000
        retryDelayMs: 30000

      logging:
        level: "INFO"
        format: "TEXT"

networks:
  tgvd-network:
    driver: bridge



