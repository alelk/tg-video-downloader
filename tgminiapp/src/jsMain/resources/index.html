<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Video Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Load runtime config (config.js). Falls back to empty defaults if file is missing.
        // In production the file is generated by Docker entrypoint from env vars.
        // Locally: copy config.example.js → config.js and fill in your values.
        window.__ENV__ = window.__ENV__ || {};
    </script>
    <script src="config.js" onerror="window.__ENV__ = window.__ENV__ || {};"></script>
    <script src="tgminiapp.js"></script>
</body>
</html>
