name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Verify Docker is available (for Testcontainers)
        run: |
          docker --version
          docker info

      # ── Node + semantic-release: только на release-ветках ──
      - name: Set up Node 20 (for semantic-release)
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release plugins
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        run: >
          npm install --global
          semantic-release@24
          @semantic-release/changelog@6
          @semantic-release/git@10
          @semantic-release/github@11
          @semantic-release/exec@6

      # dry-run записывает правильную версию в app.version через prepare.sh,
      # чтобы Gradle собрал артефакт уже с финальной версией релиза.
      - name: Determine version (dry-run)
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run || true

      - name: Show resolved app.version
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        run: echo "app.version = $(cat app.version)"

      - name: Build and Test
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build check --no-daemon

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/**/TEST-*.xml"

      # ── Semantic Release (финальный запуск — коммит + GitHub Release) ──
      - name: Release
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # ── Собрать артефакты и прикрепить к GitHub Release ──
      - name: Build release artifacts (JAR + JS)
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./gradlew
          :server:app:shadowJar
          :tgminiapp:jsBrowserProductionWebpack
          --no-daemon

      - name: Package webapp dist as tar.gz
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        run: |
          tar -czf tgvd-webapp.tar.gz \
            -C tgminiapp/build/dist/js/productionExecutable .

      - name: Upload release assets
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat app.version)
          gh release upload "v${VERSION}" \
            server/app/build/libs/tgvd-server.jar \
            tgvd-webapp.tar.gz \
            app.version \
            --clobber

      - name: Upload app.version artifact
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'next')
        uses: actions/upload-artifact@v4
        with:
          name: app-version
          path: app.version
          retention-days: 90

