name: Publish Docker Images

# Запускается ТОЛЬКО вручную (workflow_dispatch).
# Артефакты (JAR, JS) скачиваются из GitHub Release — Gradle не запускается.
#
# Inputs:
#   release_tag — тег релиза из которого брать артефакты (например: v1.2.3)
#   target      — какой образ опубликовать: server | webapp | both
#   extra_tag   — дополнительный тег образа (например: latest)

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag to fetch artifacts from (e.g. v1.2.3)"
        required: true
        type: string
      target:
        description: "Image to publish: server | webapp | both"
        required: true
        default: "both"
        type: choice
        options:
          - server
          - webapp
          - both
      extra_tag:
        description: "Additional Docker tag (e.g. latest)"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-server:
    name: Publish server image
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'server' || inputs.target == 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --pattern "tgvd-server.jar" \
            --pattern "app.version" \
            --dir ./release-assets
          cp release-assets/tgvd-server.jar .
          cp release-assets/app.version .

      - name: Read version
        id: version
        run: |
          VERSION=$(cat app.version | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (server)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-server
          tags: |
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ inputs.release_tag }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/app/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: JAR_PATH=tgvd-server.jar
          cache-from: type=gha,scope=server-ci
          cache-to: type=gha,mode=max,scope=server-ci

      - name: Summary
        run: |
          echo "### ✅ Server image published" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ inputs.release_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY

  publish-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'webapp' || inputs.target == 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --pattern "tgvd-webapp.tar.gz" \
            --pattern "app.version" \
            --dir ./release-assets
          cp release-assets/tgvd-webapp.tar.gz .
          cp release-assets/app.version .

      - name: Read version
        id: version
        run: |
          VERSION=$(cat app.version | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (webapp)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-webapp
          tags: |
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ inputs.release_tag }}

      - name: Build and push webapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tgminiapp/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: DIST_ARCHIVE=tgvd-webapp.tar.gz
          cache-from: type=gha,scope=webapp-ci
          cache-to: type=gha,mode=max,scope=webapp-ci

      - name: Summary
        run: |
          echo "### ✅ Webapp image published" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ inputs.release_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY

