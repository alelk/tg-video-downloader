name: Publish Docker Images

# Запускается ТОЛЬКО вручную (workflow_dispatch).
# Артефакты (JAR, JS) скачиваются из GitHub Release — Gradle не запускается.
#
# Inputs:
#   release_tag — тег релиза из которого брать артефакты (например: v1.2.3)
#   target      — какой образ опубликовать: server | webapp | both
#   gpu_variant — GPU-вариант серверного образа: base (software) | intel (QSV/VAAPI) | both
#   extra_tag   — дополнительный тег образа (например: latest)
#
# Результирующие теги для server (при gpu_variant=both, release_tag=v1.2.3):
#   ghcr.io/.../tg-video-downloader-server:v1.2.3        — software-only
#   ghcr.io/.../tg-video-downloader-server:v1.2.3-intel  — Intel QSV/VAAPI
#   ghcr.io/.../tg-video-downloader-server:latest        — software-only
#   ghcr.io/.../tg-video-downloader-server:latest-intel  — Intel QSV/VAAPI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag to fetch artifacts from (e.g. v1.2.3)"
        required: true
        type: string
      target:
        description: "Image to publish: server | webapp | both"
        required: true
        default: "both"
        type: choice
        options:
          - server
          - webapp
          - both
      gpu_variant:
        description: "Server GPU variant (base = software-only, intel = QSV/VAAPI, both = publish both tags)"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - base
          - intel
      extra_tag:
        description: "Additional Docker tag (e.g. latest)"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-server:
    name: "Publish server image (${{ matrix.gpu }})"
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'server' || inputs.target == 'both' }}

    strategy:
      fail-fast: false
      matrix:
        gpu: ${{ fromJSON(
          inputs.gpu_variant == 'both' && '["base","intel"]' ||
          format('["{0}"]', inputs.gpu_variant)
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --pattern "tgvd-server.jar" \
            --pattern "app.version" \
            --dir ./release-assets
          cp release-assets/tgvd-server.jar .
          cp release-assets/app.version .

      - name: Read version
        id: version
        run: |
          VERSION=$(cat app.version | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (server)
        id: meta
        uses: docker/metadata-action@v5
        env:
          # Intel variant gets "-intel" suffix on all tags
          TAG_SUFFIX: ${{ matrix.gpu == 'intel' && '-intel' || '' }}
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-server
          tags: |
            type=raw,value=${{ inputs.extra_tag }}${{ env.TAG_SUFFIX }},enable=${{ inputs.extra_tag != '' }}
            type=raw,value=${{ steps.version.outputs.version }}${{ env.TAG_SUFFIX }}
            type=raw,value=${{ inputs.release_tag }}${{ env.TAG_SUFFIX }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/app/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAR_PATH=tgvd-server.jar
            GPU_VARIANT=${{ matrix.gpu }}
          cache-from: type=gha,scope=server-ci-${{ matrix.gpu }}
          cache-to: type=gha,mode=max,scope=server-ci-${{ matrix.gpu }}

      - name: Summary
        run: |
          echo "### ✅ Server image published (${{ matrix.gpu }})" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ inputs.release_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**GPU variant:** ${{ matrix.gpu }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY

  publish-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'webapp' || inputs.target == 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --pattern "tgvd-webapp.tar.gz" \
            --pattern "app.version" \
            --dir ./release-assets
          cp release-assets/tgvd-webapp.tar.gz .
          cp release-assets/app.version .

      - name: Read version
        id: version
        run: |
          VERSION=$(cat app.version | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (webapp)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-webapp
          tags: |
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ inputs.release_tag }}

      - name: Build and push webapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tgminiapp/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: DIST_ARCHIVE=tgvd-webapp.tar.gz
          cache-from: type=gha,scope=webapp-ci
          cache-to: type=gha,mode=max,scope=webapp-ci

      - name: Summary
        run: |
          echo "### ✅ Webapp image published" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ inputs.release_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY

