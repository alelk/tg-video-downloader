name: Publish Docker Images

# Запускается ТОЛЬКО вручную (workflow_dispatch).
# Автоматической публикации образов нет.
#
# Inputs:
#   target  — какой образ опубликовать: server | webapp | both
#   tag     — дополнительный тег (например: latest, v1.2.3)
#             Версия из app.version тегируется всегда.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Image to publish: server | webapp | both"
        required: true
        default: "both"
        type: choice
        options:
          - server
          - webapp
          - both
      tag:
        description: "Additional Docker tag (e.g. latest, v1.2.3)"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  publish-server:
    name: Publish server image
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'server' || inputs.target == 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from app.version
        id: version
        run: |
          if [ -f app.version ]; then
            VERSION=$(head -n1 app.version | tr -d '[:space:]')
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1-SNAPSHOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-server
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/app/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          build-args: |
            GITHUB_USER=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Print server image digest
        run: echo "Server image pushed with tags ${{ steps.meta-server.outputs.tags }}"

  publish-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'webapp' || inputs.target == 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from app.version
        id: version
        run: |
          if [ -f app.version ]; then
            VERSION=$(head -n1 app.version | tr -d '[:space:]')
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1-SNAPSHOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (webapp)
        id: meta-webapp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-webapp
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-

      - name: Build and push webapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tgminiapp/Dockerfile
          push: true
          tags: ${{ steps.meta-webapp.outputs.tags }}
          labels: ${{ steps.meta-webapp.outputs.labels }}
          build-args: |
            GITHUB_USER=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha,scope=webapp
          cache-to: type=gha,mode=max,scope=webapp

      - name: Print webapp image digest
        run: echo "Webapp image pushed with tags ${{ steps.meta-webapp.outputs.tags }}"

